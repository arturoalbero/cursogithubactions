name: Test con Maven

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar tests unitarios
        run: mvn clean test
