name: Test con Maven

on: 
  push:
    branches:
      - main
  workflow_dispatch: 
jobs:
  unit-tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Executar tests unitaris
        run: mvn clean test
